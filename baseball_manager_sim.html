<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  body {
    font-family: var(--font-sans, sans-serif);
    font-size: 14px;
    color: var(--color-text-primary)
  }

  .bb {
    padding: 12px 0;
    max-width: 900px;
    margin: 0 auto
  }

  h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--color-text-primary)
  }

  h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--color-text-primary)
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px 14px;
    margin-bottom: 10px
  }

  .screen {
    display: none
  }

  .screen.active {
    display: block
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center
  }

  .stat-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px
  }

  .chip {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 12px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary)
  }

  .chip.good {
    background: #eaf3de;
    color: #3b6d11;
    border-color: #c0dd97
  }

  .chip.bad {
    background: #fcebeb;
    color: #a32d2d;
    border-color: #f7c1c1
  }

  .chip.neutral {
    background: #e6f1fb;
    color: #185fa5;
    border-color: #b5d4f4
  }

  button {
    cursor: pointer;
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 6px 14px;
    font-size: 13px;
    color: var(--color-text-primary);
    transition: background 0.1s
  }

  button:hover {
    background: var(--color-background-secondary)
  }

  button:active {
    transform: scale(0.98)
  }

  button.primary {
    background: #185fa5;
    color: #e6f1fb;
    border-color: #185fa5
  }

  button.primary:hover {
    background: #0c447c
  }

  button.danger {
    background: #a32d2d;
    color: #fcebeb;
    border-color: #a32d2d
  }

  button.small {
    padding: 3px 9px;
    font-size: 12px
  }

  button.selected {
    background: #eaf3de;
    border-color: #639922;
    color: #3b6d11
  }

  .lineup-slot {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 4px;
    background: var(--color-background-primary);
    cursor: pointer;
    transition: background 0.1s
  }

  .lineup-slot:hover {
    background: var(--color-background-secondary)
  }

  .lineup-slot.dragging {
    opacity: 0.5
  }

  .lineup-slot.dragover {
    border-color: #185fa5;
    background: #e6f1fb
  }

  .slot-num {
    font-size: 12px;
    color: var(--color-text-tertiary);
    width: 18px;
    text-align: right
  }

  .slot-name {
    font-weight: 500;
    font-size: 13px;
    flex: 1
  }

  .slot-pos {
    font-size: 11px;
    color: var(--color-text-secondary);
    width: 32px
  }

  .inning-log {
    max-height: 220px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7
  }

  .inning-log p {
    padding: 2px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary)
  }

  .inning-log .score-line {
    font-weight: 500;
    color: var(--color-text-info)
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 2px;
    font-size: 12px;
    text-align: center
  }

  .scoreboard .hdr {
    color: var(--color-text-secondary);
    font-size: 11px;
    padding: 2px
  }

  .scoreboard .cell {
    padding: 3px;
    border-radius: 4px;
    background: var(--color-background-secondary)
  }

  .scoreboard .team-name {
    text-align: left;
    font-weight: 500;
    font-size: 12px;
    padding: 3px 6px
  }

  .diamond-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0
  }

  svg.diamond text {
    font-family: var(--font-sans, sans-serif)
  }

  .sub-panel {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px;
    margin-top: 8px
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px
  }

  .tab {
    padding: 4px 12px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    cursor: pointer;
    border: 0.5px solid var(--color-border-tertiary);
    background: transparent;
    color: var(--color-text-secondary)
  }

  .tab.active {
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border-color: var(--color-border-secondary)
  }

  .bench-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary)
  }

  .opp-lineup {
    font-size: 12px;
    color: var(--color-text-secondary)
  }

  .count-display {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 4px 0
  }

  select {
    padding: 4px 8px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-size: 13px
  }

  .alert {
    padding: 8px 12px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    margin: 6px 0
  }

  .alert.info {
    background: #e6f1fb;
    color: #185fa5;
    border: 0.5px solid #b5d4f4
  }

  .alert.success {
    background: #eaf3de;
    color: #3b6d11;
    border: 0.5px solid #c0dd97
  }

  .alert.danger {
    background: #fcebeb;
    color: #a32d2d;
    border: 0.5px solid #f7c1c1
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px
  }

  @media(max-width:600px) {
    .two-col {
      grid-template-columns: 1fr
    }
  }
</style>

<div class="bb">
  <div id="screen-setup" class="screen active">
    <div class="card">
      <h2>Baseball Manager</h2>
      <p style="color:var(--color-text-secondary);font-size:13px;margin-bottom:12px">Two randomly generated teams. Set
        your lineup, then manage the game inning by inning.</p>
      <div class="row">
        <button class="primary" onclick="initGame()">Generate New Game</button>
      </div>
    </div>
  </div>

  <div id="screen-lineup" class="screen">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:8px">
        <h2 id="your-team-name"></h2>
        <div class="row">
          <span style="font-size:12px;color:var(--color-text-secondary)">vs</span>
          <span id="opp-team-name" style="font-weight:500;font-size:14px"></span>
        </div>
      </div>
      <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Drag to reorder your batting lineup
        (9 starters). Choose your starting pitcher.</p>
      <div class="two-col">
        <div>
          <h3>Your lineup</h3>
          <div id="lineup-list"></div>
          <div style="margin-top:8px">
            <label style="font-size:13px;color:var(--color-text-secondary)">Starting pitcher: </label>
            <select id="sp-select"></select>
          </div>
        </div>
        <div>
          <h3 style="margin-bottom:4px">Bench</h3>
          <div id="bench-display"></div>
          <div style="margin-top:10px">
            <h3>Opponent lineup</h3>
            <div id="opp-lineup-display" class="opp-lineup"></div>
          </div>
        </div>
      </div>
      <div style="margin-top:12px" class="row">
        <button class="primary" onclick="startGame()">Play Ball!</button>
      </div>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div class="two-col">
      <div>
        <div class="card" style="margin-bottom:8px">
          <div class="row" style="justify-content:space-between;margin-bottom:6px">
            <span id="game-inning-label" style="font-weight:500"></span>
            <span id="game-outs-label" style="font-size:12px;color:var(--color-text-secondary)"></span>
          </div>
          <div class="scoreboard" id="scoreboard"></div>
          <div class="count-display" id="count-display"></div>
          <div class="diamond-wrap"><svg class="diamond" width="140" height="120" id="diamond-svg"></svg></div>
          <div class="row" style="margin-top:8px;gap:8px">
            <div style="flex:1">
              <div style="font-size:12px;color:var(--color-text-secondary)">Batting: <strong
                  id="current-batter"></strong></div>
              <div style="font-size:12px;color:var(--color-text-secondary)">Pitching: <strong
                  id="current-pitcher"></strong></div>
            </div>
            <button class="primary" id="sim-btn" onclick="simulateAtBat()">Simulate at-bat</button>
            <button id="sim-inning-btn" onclick="simulateInning()">Sim full inning</button>
          </div>
        </div>
        <div class="card">
          <h3>Play log</h3>
          <div class="inning-log" id="game-log"></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="tabs">
            <button class="tab active" onclick="showMgrTab('sub')" id="tab-sub">Substitutions</button>
            <button class="tab" onclick="showMgrTab('pitch')" id="tab-pitch">Pitching</button>
            <button class="tab" onclick="showMgrTab('stats')" id="tab-stats">Stats</button>
          </div>
          <div id="mgr-sub"></div>
          <div id="mgr-pitch" style="display:none"></div>
          <div id="mgr-stats" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-gameover" class="screen">
    <div class="card" style="text-align:center;padding:32px">
      <h2>Game Over</h2>
      <p id="final-score-line" style="font-size:20px;font-weight:500;margin:12px 0"></p>
      <p id="final-result-line" style="font-size:15px;color:var(--color-text-secondary);margin-bottom:20px"></p>
      <button class="primary" onclick="initGame()">New Game</button>
    </div>
  </div>
</div>

<script>
  const POSITIONS = ['C', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF', 'DH'];
  const NAMES_F = ['Carter', 'Morgan', 'Rivera', 'Chen', 'Williams', 'Davis', 'Wilson', 'Martinez', 'Thompson', 'Robinson', 'Hayes', 'Torres', 'Nguyen', 'Parker', 'Jackson'];
  const NAMES_L = ['Smith', 'Johnson', 'Brown', 'Lee', 'Garcia', 'Miller', 'Moore', 'Taylor', 'Anderson', 'Thomas', 'White', 'Harris', 'Clark', 'Lewis', 'Walker'];
  const TEAM_NAMES = ['Redbirds', 'Thunderhawks', 'Ironclads', 'Blue Sox', 'Coyotes', 'River Dogs', 'Stallions', 'Vipers', 'Grizzlies', 'Stingrays'];
  const CITY_NAMES = ['Springfield', 'Lakewood', 'Riverdale', 'Oakburg', 'Summit', 'Millport', 'Fairview', 'Crestwood', 'Harborfield', 'Westgate'];

  let G = {};

  function rnd(min, max) { return min + Math.random() * (max - min) }
  function rndInt(min, max) { return Math.floor(rnd(min, max + 1)) }
  function pick(arr) { return arr[rndInt(0, arr.length - 1)] }
  function round2(v) { return Math.round(v * 100) / 100 }
  function round3(v) { return Math.round(v * 1000) / 1000 }

  function genPlayer(i, isPitcher) {
    const hand = Math.random() > 0.3 ? 'R' : 'L';
    const num = rndInt(1, 99);
    const first = pick(NAMES_F), last = pick(NAMES_L);
    if (isPitcher) {
      const isStarter = i < 5;
      return {
        id: i, name: `${first[0]}. ${last}`, hand, num,
        isStarter,
        role: isStarter ? 'SP' : 'RP',
        ipAvg: isStarter ? round2(rnd(4.5, 6.5)) : round2(rnd(0.8, 1.5)),
        kRate: round2(rnd(isStarter ? 0.18 : 0.22, isStarter ? 0.28 : 0.35)),
        bbRate: round2(rnd(0.06, 0.15)),
        whip: round2(rnd(isStarter ? 1.1 : 1.0, isStarter ? 1.4 : 1.35)),
        era: round2(rnd(isStarter ? 3.2 : 3.0, isStarter ? 5.5 : 5.0)),
        ipThisGame: 0, pitchesThisGame: 0, usedThisGame: false, active: false,
        currentPitcher: false
      };
    }
    const pos = POSITIONS[i] || pick(POSITIONS);
    return {
      id: i, name: `${first[0]}. ${last}`, hand, num, pos,
      avg: round3(rnd(0.220, 0.320)),
      ops: round2(rnd(0.650, 0.950)),
      bbRate: round2(rnd(0.07, 0.18)),
      kRate: round2(rnd(0.14, 0.30)),
      lineupPos: i, active: true, inGame: i < 9,
      stats: { ab: 0, h: 0, bb: 0, k: 0, rbi: 0, r: 0 }
    };
  }

  function genTeam(name) {
    const hitters = Array.from({ length: 13 }, (_, i) => genPlayer(i, false));
    const pitchers = Array.from({ length: 13 }, (_, i) => genPlayer(i, true));
    return { name, hitters, pitchers, score: [0, 0, 0, 0, 0, 0, 0, 0, 0], runs: 0 };
  }

  function initGame() {
    const cn = pick(CITY_NAMES), cn2 = pick(CITY_NAMES.filter(x => x !== cn));
    const tn = pick(TEAM_NAMES), tn2 = pick(TEAM_NAMES.filter(x => x !== tn));
    G = {
      you: genTeam(`${cn} ${tn}`),
      opp: genTeam(`${cn2} ${tn2}`),
      inning: 1, topBottom: 'bottom', outs: 0, balls: 0, strikes: 0,
      bases: [null, null, null],
      log: [], gameOver: false,
      yourLineup: Array.from({ length: 9 }, (_, i) => i),
      yourBenchIds: Array.from({ length: 4 }, (_, i) => i + 9),
      yourPitcherIdx: 0,
      battingIdx: { you: 0, opp: 0 },
      oppLineup: Array.from({ length: 9 }, (_, i) => i)
    };
    G.you.pitchers[0].active = true; G.you.pitchers[0].currentPitcher = true;
    G.opp.pitchers[0].active = true; G.opp.pitchers[0].currentPitcher = true;
    showScreen('lineup');
    renderLineup();
  }

  function renderLineup() {
    document.getElementById('your-team-name').textContent = G.you.name;
    document.getElementById('opp-team-name').textContent = G.opp.name;
    const ll = document.getElementById('lineup-list');
    ll.innerHTML = '';
    G.yourLineup.forEach((hIdx, slot) => {
      const h = G.you.hitters[hIdx];
      const div = document.createElement('div');
      div.className = 'lineup-slot'; div.draggable = true; div.dataset.slot = slot;
      div.innerHTML = `<span class="slot-num">${slot + 1}</span><span class="slot-pos">${h.pos}</span><span class="slot-name">${h.name}</span><div class="stat-chips"><span class="chip ${h.avg >= 0.280 ? 'good' : ''}">.${Math.round(h.avg * 1000)} AVG</span><span class="chip ${h.ops >= 0.800 ? 'good' : ''}">OPS ${h.ops}</span><span class="chip">#${h.num} ${h.hand}</span></div>`;
      div.addEventListener('dragstart', dragStart); div.addEventListener('dragover', dragOver); div.addEventListener('drop', dropSlot); div.addEventListener('dragleave', dragLeave);
      ll.appendChild(div);
    });
    const bd = document.getElementById('bench-display');
    bd.innerHTML = '<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">Available bench (click to swap into lineup)</div>';
    G.yourBenchIds.forEach(bi => {
      const h = G.you.hitters[bi];
      const d = document.createElement('div'); d.className = 'bench-row';
      d.innerHTML = `<span style="font-weight:500;font-size:13px;flex:1">${h.name}</span><span style="font-size:11px;color:var(--color-text-secondary)">${h.pos}</span><div class="stat-chips"><span class="chip ${h.avg >= 0.270 ? 'good' : ''}">AVG .${Math.round(h.avg * 1000)}</span></div>`;
      bd.appendChild(d);
    });
    const sps = document.getElementById('sp-select'); sps.innerHTML = '';
    G.you.pitchers.filter(p => p.isStarter).forEach((p, i) => {
      const o = document.createElement('option'); o.value = i; o.textContent = `${p.name} (ERA ${p.era}, WHIP ${p.whip}, ${p.hand}HP)`; sps.appendChild(o);
    });
    const od = document.getElementById('opp-lineup-display');
    od.innerHTML = G.opp.hitters.slice(0, 9).map((h, i) => `<div style="padding:2px 0">${i + 1}. ${h.name} - ${h.pos} | AVG .${Math.round(h.avg * 1000)} | ${h.hand}H</div>`).join('');
  }

  let dragSlot = null;
  function dragStart(e) { dragSlot = +e.currentTarget.dataset.slot; e.currentTarget.classList.add('dragging') }
  function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover') }
  function dragLeave(e) { e.currentTarget.classList.remove('dragover') }
  function dropSlot(e) {
    e.preventDefault(); e.currentTarget.classList.remove('dragover');
    const to = +e.currentTarget.dataset.slot;
    if (dragSlot === null || dragSlot === to) return;
    [G.yourLineup[dragSlot], G.yourLineup[to]] = [G.yourLineup[to], G.yourLineup[dragSlot]];
    dragSlot = null; renderLineup();
  }

  function startGame() {
    const spIdx = +document.getElementById('sp-select').value;
    G.you.pitchers.forEach(p => { p.currentPitcher = false; p.active = false });
    G.you.pitchers[spIdx].currentPitcher = true; G.you.pitchers[spIdx].active = true;
    G.yourPitcherIdx = spIdx;
    showScreen('game');
    renderGame();
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  function currentPitcher(team) { return team.pitchers.find(p => p.currentPitcher) || team.pitchers[0] }
  function currentBatter(isYou) {
    const team = isYou ? G.you : G.opp;
    const lu = isYou ? G.yourLineup : G.oppLineup;
    const idx = G.battingIdx[isYou ? 'you' : 'opp'] % 9;
    return team.hitters[lu[idx]];
  }

  function getOABResult(batter, pitcher) {
    const adjK = batter.kRate * 0.5 + pitcher.kRate * 0.5 + (pitcher.whip - 1.2) * 0.08;
    const adjBB = batter.bbRate * 0.5 + pitcher.bbRate * 0.5;
    const adjH = batter.avg * (1 / (pitcher.whip));
    const r = Math.random();
    if (r < Math.min(0.35, adjK)) return 'K';
    if (r < Math.min(0.35, adjK) + Math.min(0.18, adjBB)) return 'BB';
    if (r < Math.min(0.35, adjK) + Math.min(0.18, adjBB) + adjH * 0.35) {
      const hr = Math.random();
      if (hr < 0.08 + batter.ops * 0.04) return 'HR';
      if (hr < 0.20) return '2B';
      if (hr < 0.28) return '3B';
      return '1B';
    }
    if (r < 0.55) return 'GO';
    return 'FO';
  }

  function advanceBases(result, bases, batter) {
    let scored = 0; const nb = [...bases];
    if (result === '1B') { if (nb[2]) scored++; nb[2] = nb[1]; nb[1] = nb[0] || result; nb[0] = batter; }
    else if (result === '2B') { if (nb[2]) scored++; if (nb[1]) scored++; nb[2] = nb[0]; nb[1] = batter; nb[0] = null; }
    else if (result === '3B') { [nb[0], nb[1], nb[2]].forEach(x => { if (x) scored++; }); nb[2] = batter; nb[1] = null; nb[0] = null; }
    else if (result === 'HR') { [nb[0], nb[1], nb[2]].forEach(x => { if (x) scored++; }); nb[0] = null; nb[1] = null; nb[2] = null; scored++; }
    else if (result === 'BB') { if (nb[0] && nb[1] && nb[2]) scored++; else if (nb[0] && nb[1]) { nb[2] = batter; } else if (nb[0]) { nb[1] = batter; } else { nb[0] = batter; } }
    return { bases: nb, scored };
  }

  function simulateAtBat() {
    if (G.gameOver) return;
    const isYouBatting = G.topBottom === 'bottom';
    const battingTeam = isYouBatting ? G.you : G.opp;
    const fieldingTeam = isYouBatting ? G.opp : G.you;
    const batter = currentBatter(isYouBatting);
    const pitcher = currentPitcher(fieldingTeam);
    const result = getOABResult(batter, pitcher);
    let msg = '';
    batter.stats.ab++;
    pitcher.pitchesThisGame = pitcher.pitchesThisGame + 1;
    if (result === 'K') { G.outs++; batter.stats.k++; msg = `${batter.name} strikes out.`; }
    else if (result === 'GO') { G.outs++; msg = `${batter.name} grounds out.`; }
    else if (result === 'FO') { G.outs++; msg = `${batter.name} flies out.`; }
    else {
      const { bases, scored } = advanceBases(result, G.bases, batter);
      G.bases = bases;
      if (result === 'BB') { msg = `${batter.name} walks.`; }
      else { batter.stats.h++; msg = `${batter.name} hits a ${result}!`; }
      if (scored > 0) {
        battingTeam.score[G.inning - 1] = (battingTeam.score[G.inning - 1] || 0) + scored;
        battingTeam.runs += scored;
        batter.stats.rbi += scored;
        msg += ` ${scored} run${scored > 1 ? 's' : ''} score!`;
      }
    }
    G.battingIdx[isYouBatting ? 'you' : 'opp']++;
    G.log.unshift(msg);
    if (G.outs >= 3) { endHalfInning(); }
    renderGame();
  }

  function simulateInning() {
    if (G.gameOver) return;
    while (!G.gameOver && G.outs < 3) { simulateAtBat(); }
  }

  function endHalfInning() {
    G.outs = 0; G.balls = 0; G.strikes = 0; G.bases = [null, null, null];
    if (G.topBottom === 'top') {
      G.topBottom = 'bottom';
    } else {
      if (G.inning >= 9 && G.you.runs !== G.opp.runs) { endGame(); return; }
      if (G.inning >= 9) { G.inning++; if (G.inning > 12) { endGame(); return; } }
      else { G.inning++; G.topBottom = 'top'; }
    }
    if (!G.gameOver) {
      const innLabel = `${G.topBottom === 'top' ? 'Top' : 'Bot'} ${G.inning}`;
      G.log.unshift(`--- ${innLabel} ---`);
      if (G.topBottom === 'bottom') renderMgr();
    }
  }

  function endGame() {
    G.gameOver = true;
    document.getElementById('final-score-line').textContent = `${G.you.name} ${G.you.runs} – ${G.opp.runs} ${G.opp.name}`;
    const won = G.you.runs > G.opp.runs;
    document.getElementById('final-result-line').textContent = won ? 'Your team wins! Great managing.' : 'Your team loses. Better luck next time.';
    showScreen('gameover');
  }

  function renderGame() {
    if (G.gameOver) return;
    const half = G.topBottom === 'top' ? 'Top' : 'Bot';
    document.getElementById('game-inning-label').textContent = `${half} ${G.inning}`;
    document.getElementById('game-outs-label').textContent = `Outs: ${G.outs}`;
    document.getElementById('count-display').textContent = `B: ${G.balls}  S: ${G.strikes}`;
    const isYouBatting = G.topBottom === 'bottom';
    const batter = currentBatter(isYouBatting);
    const fTeam = isYouBatting ? G.opp : G.you;
    const pitcher = currentPitcher(fTeam);
    document.getElementById('current-batter').textContent = `${batter.name} (.${Math.round(batter.avg * 1000)})`;
    document.getElementById('current-pitcher').textContent = `${pitcher.name} (${pitcher.hand}HP, WHIP ${pitcher.whip})`;
    renderScoreboard(); renderDiamond(); renderLog(); renderMgr();
  }

  function renderScoreboard() {
    const sb = document.getElementById('scoreboard');
    const innings = Math.max(9, G.inning);
    let html = '<div class="hdr" style="grid-column:span 1"></div>';
    for (let i = 1; i <= Math.min(9, innings); i++)html += `<div class="hdr">${i}</div>`;
    html += '<div class="hdr">R</div>';
    [G.you, G.opp].forEach(team => {
      html += `<div class="team-name" style="font-size:11px">${team.name.split(' ')[1] || team.name}</div>`;
      for (let i = 1; i <= Math.min(9, innings); i++) {
        const v = team.score[i - 1]; html += `<div class="cell">${v !== undefined ? v : '-'}</div>`;
      }
      html += `<div class="cell" style="font-weight:500">${team.runs}</div>`;
    });
    sb.innerHTML = html; sb.style.gridTemplateColumns = `80px repeat(${Math.min(9, innings)},1fr) 32px`;
  }

  function renderDiamond() {
    const svg = document.getElementById('diamond-svg');
    const cx = 70, cy = 60;
    const bases = [[cx, cy - 38], [cx + 38, cy], [cx, cy + 38], [cx - 38, cy]];
    const colors = G.bases.map(b => b ? '#185fa5' : 'var(--color-background-secondary)');
    svg.innerHTML = `
    <polygon points="${cx},${cy - 38} ${cx + 38},${cy} ${cx},${cy + 38} ${cx - 38},${cy}" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5"/>
    <rect x="${cx - 8}" y="${cy - 8}" width="16" height="16" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" rx="2"/>
    <rect x="${cx + 30}" y="${cy - 8}" width="16" height="16" fill="${colors[0]}" stroke="var(--color-border-primary)" rx="2"/>
    <rect x="${cx - 8}" y="${cy - 46}" width="16" height="16" fill="${colors[1]}" stroke="var(--color-border-primary)" rx="2"/>
    <rect x="${cx - 46}" y="${cy - 8}" width="16" height="16" fill="${colors[2]}" stroke="var(--color-border-primary)" rx="2"/>
    <text x="${cx + 38}" y="${cy - 14}" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">1B</text>
    <text x="${cx}" y="${cy - 54}" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">2B</text>
    <text x="${cx - 38}" y="${cy - 14}" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">3B</text>`;
  }

  function renderLog() {
    const el = document.getElementById('game-log');
    el.innerHTML = G.log.slice(0, 40).map(l => `<p class="${l.startsWith('---') ? 'score-line' : ''}">${l}</p>`).join('');
  }

  function showMgrTab(t) {
    ['sub', 'pitch', 'stats'].forEach(x => {
      document.getElementById('mgr-' + x).style.display = x === t ? 'block' : 'none';
      document.getElementById('tab-' + x).classList.toggle('active', x === t);
    });
  }

  function renderMgr() {
    renderSubPanel(); renderPitchPanel(); renderStatsPanel();
  }

  function renderSubPanel() {
    const el = document.getElementById('mgr-sub');
    if (G.topBottom !== 'bottom') { el.innerHTML = '<p style="color:var(--color-text-secondary);font-size:13px">Substitutions available between half-innings when your team bats next.</p>'; return; }
    const bench = G.yourBenchIds.filter(bi => G.you.hitters[bi].active && !G.you.hitters[bi].inGame);
    if (bench.length === 0) { el.innerHTML = '<div class="alert info">No bench players remaining.</div>'; return; }
    let html = '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Pinch hit: replace a lineup spot with a bench player.</p>';
    html += '<div style="margin-bottom:6px"><label style="font-size:12px">Replace: </label><select id="sub-out-sel">';
    G.yourLineup.forEach((hi, slot) => { const h = G.you.hitters[hi]; html += `<option value="${slot}">${slot + 1}. ${h.name} (${h.pos}) .${Math.round(h.avg * 1000)}</option>`; });
    html += '</select></div>';
    html += '<div style="margin-bottom:8px"><label style="font-size:12px">Bring in: </label><select id="sub-in-sel">';
    bench.forEach(bi => { const h = G.you.hitters[bi]; html += `<option value="${bi}">${h.name} (${h.pos}) .${Math.round(h.avg * 1000)} OPS ${h.ops}</option>`; });
    html += '</select></div>';
    html += `<button onclick="makeSub()">Make substitution</button>`;
    el.innerHTML = html;
  }

  function makeSub() {
    const outSlot = +document.getElementById('sub-out-sel').value;
    const inIdx = +document.getElementById('sub-in-sel').value;
    const outIdx = G.yourLineup[outSlot];
    G.you.hitters[outIdx].inGame = false;
    G.you.hitters[inIdx].inGame = true;
    G.yourLineup[outSlot] = inIdx;
    G.yourBenchIds = G.yourBenchIds.filter(x => x !== inIdx);
    G.log.unshift(`Sub: ${G.you.hitters[inIdx].name} replaces ${G.you.hitters[outIdx].name} (${outSlot + 1} spot).`);
    renderMgr(); renderGame();
  }

  function renderPitchPanel() {
    const el = document.getElementById('mgr-pitch');
    const cp = currentPitcher(G.you);
    let html = `<div class="alert info" style="margin-bottom:8px">Current: ${cp.name} | ${cp.hand}HP | WHIP ${cp.whip} | ${cp.pitchesThisGame} est. pitches</div>`;
    const avail = G.you.pitchers.filter(p => !p.currentPitcher && !p.usedThisGame);
    if (avail.length === 0) { html += '<div class="alert danger">No fresh pitchers available.</div>'; el.innerHTML = html; return; }
    html += '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Select a reliever:</p>';
    avail.forEach(p => {
      html += `<div class="bench-row"><span style="font-weight:500;font-size:13px;flex:1">${p.name}</span><div class="stat-chips"><span class="chip ${p.whip < 1.2 ? 'good' : ''}">${p.role}</span><span class="chip">WHIP ${p.whip}</span><span class="chip">K% ${Math.round(p.kRate * 100)}%</span><span class="chip">${p.hand}HP</span></div><button class="small" onclick="changePitcher(${p.id})">Bring in</button></div>`;
    });
    el.innerHTML = html;
  }

  function changePitcher(pid) {
    const cp = currentPitcher(G.you); cp.currentPitcher = false; cp.usedThisGame = true;
    const np = G.you.pitchers.find(p => p.id === pid); np.currentPitcher = true; np.active = true;
    G.log.unshift(`Pitching change: ${np.name} comes in for ${cp.name}.`);
    renderGame();
  }

  function renderStatsPanel() {
    const el = document.getElementById('mgr-stats');
    let html = '<p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">Your lineup this game:</p>';
    G.yourLineup.forEach((hi, slot) => {
      const h = G.you.hitters[hi];
      const avg = h.stats.ab > 0 ? round3(h.stats.h / h.stats.ab) : '-';
      html += `<div style="display:flex;gap:8px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px"><span style="width:18px;color:var(--color-text-tertiary)">${slot + 1}</span><span style="flex:1;font-weight:500">${h.name}</span><span style="color:var(--color-text-secondary)">${h.stats.ab}-${h.stats.h} ${h.stats.bb}BB ${h.stats.k}K ${h.stats.rbi}RBI</span></div>`;
    });
    el.innerHTML = html;
  }
</script>
